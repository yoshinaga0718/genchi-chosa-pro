async function captureCurrentDrawingView(pageNum=currentPage){
    if(!map) return null;
    const restoreView=document.querySelector('.view.is-visible')?.id||'editor';
    const restorePage=currentPage;
    showViewForCapture('editor');
    await wait(250); map.invalidateSize(); await wait(250);
    if(currentPdf&&pageNum!==currentPage){await loadPdfPage(pageNum);await wait(700);}
    if(window.bg?.getBounds){try{map.fitBounds(window.bg.getBounds(),{animate:false,padding:[6,6]});await wait(350);map.invalidateSize();}catch(e){}}
    const mapEl=document.getElementById('map');
    const mapRect=mapEl.getBoundingClientRect();
    const bgImg=window.bg?._image||null;
    const bgRect=bgImg?bgImg.getBoundingClientRect():mapRect;
    const pad=18;
    const cropLeft=Math.max(0,bgRect.left-mapRect.left-pad);
    const cropTop=Math.max(0,bgRect.top-mapRect.top-pad);
    const cropRight=Math.min(mapRect.width,bgRect.right-mapRect.left+pad);
    const cropBottom=Math.min(mapRect.height,bgRect.bottom-mapRect.top+pad);
    const cropW=Math.max(1,cropRight-cropLeft);
    const cropH=Math.max(1,cropBottom-cropTop);
    const scale=4;
    const canvas=document.createElement('canvas');
    canvas.width=Math.max(1,Math.round(cropW*scale));
    canvas.height=Math.max(1,Math.round(cropH*scale));
    const ctx=canvas.getContext('2d');
    ctx.scale(scale,scale);
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cropW,cropH);
    try {
        ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
        if(bgImg){
            const r=bgImg.getBoundingClientRect();
            const imgLeft=r.left-mapRect.left, imgTop=r.top-mapRect.top;
            const ratioX=(bgImg.naturalWidth||r.width)/r.width;
            const ratioY=(bgImg.naturalHeight||r.height)/r.height;
            let sx=(cropLeft-imgLeft)*ratioX, sy=(cropTop-imgTop)*ratioY;
            let sw=cropW*ratioX, sh=cropH*ratioY;
            let dx=0, dy=0, dw=cropW, dh=cropH;
            if(sx<0){dx=-sx/ratioX;dw-=dx;sw+=sx;sx=0;}
            if(sy<0){dy=-sy/ratioY;dh-=dy;sh+=sy;sy=0;}
            if(sx+sw>bgImg.naturalWidth){const o=sx+sw-bgImg.naturalWidth;sw-=o;dw-=o/ratioX;}
            if(sy+sh>bgImg.naturalHeight){const o=sy+sh-bgImg.naturalHeight;sh-=o;dh-=o/ratioY;}
            if(sw>0&&sh>0&&dw>0&&dh>0) ctx.drawImage(bgImg,sx,sy,sw,sh,dx,dy,dw,dh);
        }
    } catch(e){console.error('background draw failed',e);}

    const saved=await db.annotations.where('projectId').equals(currentProjectId).and(a=>a.isDeleted===0&&(a.page||1)===pageNum).toArray();
    const allSavedForNo=await db.annotations.where('projectId').equals(currentProjectId).and(a=>a.isDeleted===0).toArray();
    const noById={}; allSavedForNo.forEach((a,idx)=>noById[a.id]=idx+1);
    const showNoLabels=outputNoLabels;
    const nonLineCount=saved.filter(a=>a.type!=='line').length;
    const densityFactor=nonLineCount>=15?0.55:(nonLineCount>=8?0.72:0.85);
    const compactFactor=densityFactor*outputObjectScale;
    const pinRadius=Math.max(1.0,6*compactFactor);
    const pinBorder=Math.max(0.35,1.8*compactFactor);
    const arrowSize=Math.max(2.4,12*compactFactor);
    const lineWidthOut=Math.max(0.45,4*compactFactor);
    const fontSizeOut=Math.max(3,12*compactFactor);
    const showBalloonOut=outputBalloons;
    const balloonFontOut=Math.max(2,Math.round(10*outputObjectScale*outputBalloonScale));
    const balloonBoxes=[];

    function overlapArea(a,b){const x=Math.max(0,Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x));const y=Math.max(0,Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y));return x*y;}
    function clampBox(box){return{x:Math.max(2,Math.min(cropW-box.w-2,box.x)),y:Math.max(2,Math.min(cropH-box.h-2,box.y)),w:box.w,h:box.h};}
    function chooseBalloonBox(p,w,h){
        const gap=Math.max(4,pinRadius+4);
        const candidates=[{x:p.x+gap,y:p.y-h-gap},{x:p.x+gap,y:p.y+gap},{x:p.x-w-gap,y:p.y-h-gap},{x:p.x-w-gap,y:p.y+gap},{x:p.x-w/2,y:p.y-h-gap*1.6},{x:p.x-w/2,y:p.y+gap*1.6}].map(b=>clampBox({...b,w,h}));
        let best=candidates[0],bestScore=Infinity;
        for(const c of candidates){const s=balloonBoxes.reduce((sum,b)=>sum+overlapArea(c,b),0);if(s<bestScore){best=c;bestScore=s;if(s===0)break;}}
        balloonBoxes.push(best);return best;
    }
    function pt(lat,lng){const p=map.latLngToContainerPoint([lat,lng]);return L.point(p.x-cropLeft,p.y-cropTop);}

    function drawPin(a){
        const p=pt(a.lat,a.lng),color=a.color||'#ff0000',no=noById[a.id];
        ctx.save();ctx.fillStyle=color;ctx.strokeStyle='#ffffff';ctx.lineWidth=pinBorder;
        ctx.beginPath();ctx.arc(p.x,p.y,pinRadius,0,Math.PI*2);ctx.fill();ctx.stroke();
        if(showNoLabels&&no){ctx.fillStyle='#ffffff';ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=Math.max(0.5,pinRadius*.18);ctx.font=`bold ${Math.max(1.8,pinRadius*1.05)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.strokeText(String(no),p.x,p.y+.5);ctx.fillText(String(no),p.x,p.y+.5);}
        ctx.restore();
    }
    function drawArrow(a){
        const p=pt(a.lat,a.lng),angle=Number(a.angle||0)*Math.PI/180,no=noById[a.id],color=a.color||'#ff0000';
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(angle);ctx.fillStyle=color;ctx.strokeStyle='#ffffff';ctx.lineWidth=Math.max(1,pinBorder);ctx.lineJoin='round';
        ctx.beginPath();ctx.moveTo(0,-arrowSize);ctx.lineTo(arrowSize*.8,-arrowSize*.15);ctx.lineTo(arrowSize*.38,-arrowSize*.15);ctx.lineTo(arrowSize*.38,arrowSize);ctx.lineTo(-arrowSize*.38,arrowSize);ctx.lineTo(-arrowSize*.38,-arrowSize*.15);ctx.lineTo(-arrowSize*.8,-arrowSize*.15);ctx.closePath();ctx.fill();ctx.stroke();
        if(showNoLabels&&no){ctx.fillStyle='#ffffff';ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=Math.max(0.5,arrowSize*.10);ctx.font=`bold ${Math.max(1.8,arrowSize*.42)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.strokeText(String(no),0,arrowSize*.25);ctx.fillText(String(no),0,arrowSize*.25);}
        ctx.restore();
    }
    function drawText(a){
        const p=pt(a.lat,a.lng),no=noById[a.id];
        ctx.save();ctx.font=`bold ${fontSizeOut}px sans-serif`;ctx.textBaseline='middle';ctx.lineWidth=Math.max(2,fontSizeOut/4);ctx.strokeStyle='rgba(255,255,255,.9)';ctx.fillStyle=a.color||'#ff0000';
        ctx.strokeText(a.text||'テキスト',p.x,p.y);ctx.fillText(a.text||'テキスト',p.x,p.y);
        if(showNoLabels&&no){const r=Math.max(1.2,pinRadius*.65);const ox=p.x-Math.max(3,pinRadius*1.4),oy=p.y-Math.max(3,pinRadius*1.4);ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.strokeStyle=a.color||'#ff0000';ctx.lineWidth=Math.max(.35,pinBorder);ctx.stroke();ctx.fillStyle='#111';ctx.font=`bold ${Math.max(1.8,r*1.05)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(no),ox,oy+.3);}
        ctx.restore();
    }
    function drawLine(a){
        const strokes=(Array.isArray(a.strokes)&&a.strokes.length)?a.strokes:[a.points];
        ctx.save();ctx.strokeStyle=a.color||'#ff0000';ctx.lineWidth=lineWidthOut;ctx.lineCap='round';ctx.lineJoin='round';
        strokes.forEach(st=>{if(!Array.isArray(st)||st.length<2)return;ctx.beginPath();st.forEach((p0,idx)=>{const p=pt(p0[0],p0[1]);if(idx===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);});ctx.stroke();});
        const first=strokes.find(st=>Array.isArray(st)&&st.length>1);
        if(showNoLabels&&first){const mid=first[Math.floor(first.length/2)];const mp=pt(mid[0],mid[1]);const no=noById[a.id];if(no){ctx.beginPath();ctx.arc(mp.x,mp.y,Math.max(1.2,pinRadius*.65),0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.strokeStyle=a.color||'#ff0000';ctx.lineWidth=Math.max(.35,pinBorder);ctx.stroke();ctx.fillStyle='#111';ctx.font=`bold ${Math.max(1.8,pinRadius*.65*1.05)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(no),mp.x,mp.y+.3);}}
        ctx.restore();
    }
    function drawBalloon(a){
        if(a.type==='line'||!showBalloonOut) return;
        const parts=getAnnotationBalloonParts(a);
        const text=parts.plain; if(!text) return;
        const p=pt(a.lat,a.lng);
        ctx.save();ctx.font=`${balloonFontOut}px sans-serif`;
        const maxChars=outputBalloonScale<=0.3?3:(outputBalloonScale<=0.55?5:10);
        const displayText=text.length>maxChars?text.slice(0,maxChars)+'…':text;
        const padX=Math.max(2,Math.round(balloonFontOut*.28));
        const padY=Math.max(1,Math.round(balloonFontOut*.18));
        const w=Math.ceil(ctx.measureText(displayText).width)+padX*2;
        const h=balloonFontOut+padY*2;
        const box=chooseBalloonBox(p,w,h);
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(box.x+w/2,box.y+h/2);ctx.strokeStyle='rgba(80,80,80,.30)';ctx.lineWidth=0.6;ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,.68)';ctx.strokeStyle='rgba(60,60,60,.75)';ctx.lineWidth=0.7;ctx.fillRect(box.x,box.y,w,h);ctx.strokeRect(box.x,box.y,w,h);
        ctx.fillStyle='#111';ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillText(displayText,box.x+padX,box.y+padY+balloonFontOut-1);
        ctx.restore();
    }
    saved.filter(a=>a.type==='line').forEach(drawLine);
    saved.filter(a=>a.type!=='line').forEach(a=>{if(a.type==='pin')drawPin(a);else if(a.type==='arrow')drawArrow(a);else if(a.type==='text')drawText(a);else drawPin(a);drawBalloon(a);});

    const result={url:canvas.toDataURL('image/png'),width:canvas.width,height:canvas.height,page:pageNum,zoom:map.getZoom()};
    latestDrawingCapture=result;
    if(currentPdf&&restorePage!==currentPage){await loadPdfPage(restorePage);await wait(300);}
    showViewForCapture(restoreView);
    if(restoreView==='editor') setTimeout(()=>map.invalidateSize(),100);
    return result;
}

/* ===== 16. 報告書 ===== */
async function buildReportFigure(p,list){
    if(!p) return '<div style="padding:10px;border:1px solid #ccc;border-radius:6px;">現場情報なし</div>';
    if(p.mode==='gsi'){
        const capture=latestMapCapture||await captureCurrentMapView();
        if(!capture) return '<div style="padding:10px;border:1px solid #ccc;border-radius:6px;">地図画像を取得できませんでした</div>';
        const centerLat=Number(capture.center?.lat??0).toFixed(6);
        const centerLng=Number(capture.center?.lng??0).toFixed(6);
        return `<h3 style="margin-top:18px;">地図（現在の画角）</h3>
            <div style="page-break-inside:avoid;margin:10px 0 18px;">
            <div style="font-size:12px;color:#444;margin-bottom:4px;">中心座標：${centerLat}, ${centerLng} / ズーム：${capture.zoom}</div>
            <div style="position:relative;width:100%;border:1px solid #333;background:#eee;">
            <img src="${capture.url}" style="display:block;width:100%;height:auto;"></div></div>`;
    }
    if(p.mode==='pdf'){
        let pages=[...new Set(list.map(a=>a.page||1))].sort((a,b)=>a-b);
        if(pages.length===0) pages=[currentPage||1];
        let html='<h3 style="margin-top:18px;">図面</h3>';
        for(const pg of pages){
            const capture=await captureCurrentDrawingView(pg);
            if(!capture?.url){html+=`<div style="margin:12px 0;padding:10px;border:1px solid #f59e0b;background:#fffbeb;">図面ページ ${pg} の画像を取得できませんでした。</div>`;continue;}
            html+=`<div style="page-break-inside:avoid;margin:10px 0 18px;"><div style="font-weight:bold;margin-bottom:4px;">図面ページ ${esc(pg)}</div>
                <div style="position:relative;width:100%;border:1px solid #333;background:#eee;">
                <img src="${capture.url}" style="display:block;width:100%;height:auto;"></div></div>`;
        }
        return html;
    }
    return '<div style="padding:10px;border:1px solid #ccc;border-radius:6px;">図面：出力対象外</div>';
}

function nearestOptionValue(value,options){
    let best=options[0],bestDiff=Math.abs(Number(value)-Number(best));
    options.forEach(v=>{const d=Math.abs(Number(value)-Number(v));if(d<bestDiff){best=v;bestDiff=d;}});
    return best;
}

function syncOutputControlsToState(){
    const objOpts=['0.75','0.90','1.05','1.20','1.40','1.60','1.85'];
    const blnOpts=['0.20','0.35','0.55','0.80','1.05','1.30'];
    const objVal=nearestOptionValue(outputObjectScale,objOpts);
    const blnVal=nearestOptionValue(outputBalloonScale,blnOpts);
    outputObjectScale=Number(objVal); outputBalloonScale=Number(blnVal);
    ['outputObjectScale','reviewOutputObjectScale'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=objVal;});
    ['outputBalloonScale','reviewOutputBalloonScale'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=blnVal;});
    ['outputNoLabels','reviewOutputNoLabels'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=!!outputNoLabels;});
    ['outputBalloons','reviewOutputBalloons'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=!!outputBalloons;});
}

async function loadReview(){
    syncOutputControlsToState();
    if(!currentProjectId){document.getElementById('reviewArea').innerHTML='<p>現場を選択してください。</p>';return [];}
    const p=await db.projects.get(currentProjectId);
    const list=await db.annotations.where('projectId').equals(currentProjectId).and(a=>a.isDeleted===0).toArray();
    let figureHtml='';
    try{figureHtml=await buildReportFigure(p,list);}
    catch(e){console.error(e);figureHtml='<div style="padding:10px;border:1px solid #f59e0b;background:#fffbeb;">図面プレビューの作成に失敗しました。編集画面を一度開いてから再度お試しください。</div>';}
    const noById = {}; list.forEach((a,idx)=>noById[a.id]=idx+1);
    const rows=list.map((a,idx)=>`
        <tr class="review-row" data-id="${a.id}" onclick="selectAnnotationFromReview('${a.id}')">
            <td><button class="review-jump-btn" onclick="event.stopPropagation();selectAnnotationFromReview('${a.id}')">表示</button></td>
            <td>${idx+1}</td><td>${esc(a.type||'')}</td><td>${esc(a.page||'')}
            ${currentFields.map(f=>`</td><td>${esc(a.customData?.[f.name]||'')}${f.photo&&a.fieldPhotos?.[f.name]?' 📷':''}`).join('')}
            </td><td>${a.photos?.length?`📷×${a.photos.length}`:''}</td>
        </tr>`).join('');

    /* 写真一覧セクション */
    const photoList = list.filter(a=>a.photos?.length>0);
    let photoGalleryHtml = '';
    if (photoList.length > 0) {
        photoGalleryHtml = '<h3 style="margin-top:28px;page-break-before:always;">写真一覧</h3>';
        photoList.forEach(a => {
            const no = noById[a.id];
            const firstFieldName = currentFields[0]?.name;
            const subLabel = firstFieldName ? (a.customData?.[firstFieldName]||'') : '';
            a.photos.forEach((ph, pi) => {
                let gpsText;
                if (!ph.gps)                        gpsText = 'GPS情報なし';
                else if (ph.gps.source==='exif')    gpsText = `緯度:${ph.gps.lat.toFixed(6)} 経度:${ph.gps.lng.toFixed(6)}`;
                else if (ph.gps.source==='map')     gpsText = `緯度:${ph.gps.lat.toFixed(6)} 経度:${ph.gps.lng.toFixed(6)}（地図中心位置）`;
                else                                gpsText = `緯度:${ph.gps.lat.toFixed(6)} 経度:${ph.gps.lng.toFixed(6)}${ph.gps.accuracy!=null?' 精度±'+ph.gps.accuracy+'m':''}`;
                const dt = new Date(ph.timestamp);
                const timeStr = `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
                photoGalleryHtml += `<div style="page-break-inside:avoid;margin-bottom:16px;padding:10px;border:1px solid #e2e8f0;border-radius:6px;">
                    <div style="font-weight:bold;margin-bottom:3px;">No.${no} [${esc(a.type||'')}]${subLabel?' — '+esc(subLabel):''}　写真${pi+1}</div>
                    <div style="font-size:12px;color:#475569;margin-bottom:6px;">${esc(timeStr)}　${esc(gpsText)}</div>
                    <div style="aspect-ratio:4/3;max-width:480px;overflow:hidden;background:#f1f5f9;border-radius:4px;border:1px solid #cbd5e1;">
                        <img src="${ph.dataUrl}" style="width:100%;height:100%;object-fit:contain;display:block;">
                    </div>
                </div>`;
            });
        });
    }
    document.getElementById('reviewArea').innerHTML=`
        <h2 style="margin-top:0;">調査報告書${p?.locked?'<span class="lock-badge">ロック中</span>':''}</h2>
        <div class="preview-actions review-live-controls">
            <button class="preview-back-btn" onclick="switchView('export')">出力画面に戻る</button>
            <button class="preview-print-btn" onclick="window.print()">この内容でPDF出力</button>
            <button id="exportPhotosZipBtn" class="primary" onclick="exportPhotosZip()" style="background:#0f766e;padding:8px 14px;">📦 写真をZIPダウンロード</button>
            <button class="${p?.locked?'unlock-btn':'lock-btn'}" onclick="toggleProjectLock()">${p?.locked?'🔓 ロック解除':'🔒 この内容でロック'}</button>
            <label>オブジェクトサイズ
                <select id="reviewOutputObjectScale" onchange="setOutputObjectScale(this.value)">
                    <option value="0.75">最小</option><option value="0.90">かなり小</option>
                    <option value="1.05">極小</option><option value="1.20">小</option>
                    <option value="1.40">標準</option><option value="1.60">大</option><option value="1.85">特大</option>
                </select>
            </label>
            <label>吹き出し文字サイズ
                <select id="reviewOutputBalloonScale" onchange="setOutputBalloonScale(this.value)">
                    <option value="0.20">最小</option><option value="0.35">かなり小</option>
                    <option value="0.55">小</option><option value="0.80">標準</option>
                    <option value="1.05">大</option><option value="1.30">特大</option>
                </select>
            </label>
            <label class="review-check"><input type="checkbox" id="reviewOutputNoLabels" onchange="setOutputNoLabels(this.checked)" style="width:auto;margin:0;"> No.表示</label>
            <label class="review-check"><input type="checkbox" id="reviewOutputBalloons" onchange="setOutputBalloons(this.checked)" style="width:auto;margin:0;"> 吹き出し表示</label>
        </div>
        <div style="margin-bottom:8px;">現場名：${esc(p?.name||'')}</div>
        <div style="margin-bottom:8px;">担当者：${esc(p?.author||'')}</div>
        ${figureHtml}
        <h3 style="margin-top:18px;">詳細一覧</h3>
        <table style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#f1f5f9;"><th>選択</th><th>No.</th><th>種別</th><th>頁</th>${currentFields.map(f=>`<th>${esc(f.name)}</th>`).join('')}<th>写真</th></tr></thead>
            <tbody>${rows||'<tr><td colspan="99" style="padding:10px;color:#94a3b8;">記録なし</td></tr>'}</tbody>
        </table>
        ${photoGalleryHtml}`;
    syncOutputControlsToState();
    return list;
}

async function selectAnnotationFromReview(id){
    markReviewRowSelected(id);
    const a=await db.annotations.get(id);
    if(!a||a.isDeleted) return alert("対象のオブジェクトが見つかりません");
    switchView('editor');
    if(map&&map.options.crs===L.CRS.Simple&&currentPdf&&(a.page||1)!==currentPage){await loadPdfPage(a.page||1);await new Promise(res=>setTimeout(res,700));}
    await refreshAnnotations();
    await new Promise(res=>setTimeout(res,250));
    const m=markers[id];
    highlightSelectedAnnotation(a);
    if(m){
        if(m.layer.getLatLng){map.panTo(m.layer.getLatLng());openEdit(id);if(m.layer.openTooltip)m.layer.openTooltip();}
        else if(a.points?.[0]){try{map.fitBounds(L.latLngBounds(a.points.map(p=>[p[0],p[1]])),{padding:[70,70],animate:true});}catch(e){map.panTo([a.points[0][0],a.points[0][1]]);}}
    } else alert("対象ページを表示しました。");
}

function markReviewRowSelected(id){
    selectedReviewAnnotationId=id;
    document.querySelectorAll('.review-row').forEach(row=>row.classList.toggle('selected-review-row',row.dataset.id===id));
}

function clearSelectedHighlight(){
    if(selectedHighlightLayer&&map){try{map.removeLayer(selectedHighlightLayer);}catch(e){}}
    selectedHighlightLayer=null;
}

function highlightSelectedAnnotation(a){
    clearSelectedHighlight();
    if(!map||!a) return;
    if(a.type==='line'&&Array.isArray(a.points)&&a.points.length>1){
        selectedHighlightLayer=L.polyline(a.points,{color:'#2563eb',weight:12,opacity:0.42,dashArray:'14,10',interactive:false}).addTo(map);
        try{map.fitBounds(selectedHighlightLayer.getBounds(),{padding:[60,60],animate:true});}catch(e){}
        setTimeout(clearSelectedHighlight,5000);return;
    }
    if(typeof a.lat==='number'&&typeof a.lng==='number'){
        selectedHighlightLayer=L.marker([a.lat,a.lng],{interactive:false,icon:L.divIcon({className:'',iconSize:[1,1],iconAnchor:[0,0],html:'<div class="selected-pulse-marker"></div>'})}).addTo(map);
        try{map.panTo([a.lat,a.lng]);}catch(e){}
        setTimeout(clearSelectedHighlight,5000);
    }
}

async function prepareReportPreview(){
    if(!currentProjectId) return alert("現場を選択してください");
    latestDrawingCapture=null;
    await loadReview();
    switchView('review');
}

async function preparePrint(){
    if(!currentProjectId) return alert("現場を選択してください");
    if(!confirm("報告書プレビューを更新してPDF出力画面を開きます。よろしいですか？")) return;
    const p=await db.projects.get(currentProjectId);
    if(p?.mode==='gsi'){try{await captureCurrentMapView();}catch(e){console.error(e);alert('地図画像の取得に失敗しました。編集画面を一度開いてから再度お試しください。');return;}}
    if(p?.mode==='pdf'){try{latestDrawingCapture=null;await captureCurrentDrawingView();}catch(e){console.error(e);alert('図面画像の取得に失敗しました。');return;}}
    await loadReview();
    switchView('review');
    setTimeout(()=>window.print(),500);
}

/* ===== 17. エクスポート ===== */
const csvEscape = v=>`"${(v??'').toString().replace(/"/g,'""')}"`;

async function exportCSV(){
    if(!currentProjectId) return alert("現場を選択してください");
    const list=await db.annotations.where('projectId').equals(currentProjectId).and(a=>a.isDeleted===0).toArray();
    let csv="﻿type,page,"+currentFields.map(f=>csvEscape(f.name)).join(",")+"\n";
    list.forEach(a=>{csv+=[csvEscape(a.type),csvEscape(a.page),...currentFields.map(f=>csvEscape(a.customData?.[f.name]||""))].join(",")+"\n";});
    const link=document.createElement("a");
    link.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    link.download="data.csv"; link.click();
}

async function exportGeoJSON(){
    if(!currentProjectId) return alert("現場を選択してください");
    const list=await db.annotations.where('projectId').equals(currentProjectId).and(a=>a.isDeleted===0).toArray();
    const features=list.map(a=>{
        const geometry=a.type==='line'?{type:"LineString",coordinates:(a.points||[]).map(p=>[p[1],p[0]])}:{type:"Point",coordinates:[a.lng,a.lat]};
        return {type:"Feature",geometry,properties:{...(a.customData||{}),type:a.type,page:a.page,color:a.color}};
    });
    const link=document.createElement("a");
    link.href=URL.createObjectURL(new Blob([JSON.stringify({type:"FeatureCollection",features},null,2)],{type:'application/geo+json'}));
    link.download="data.geojson"; link.click();
}

async function exportProjectFile(pid,includePhotos=true){
    const p=await db.projects.get(pid);
    const annts=await db.annotations.where('projectId').equals(pid).toArray();
    const project={...p};
    if(project.pdfData) project.pdfB64=await blobToBase64(new Blob([project.pdfData]));
    delete project.pdfData;
    if(project.bgBlob) project.bgBlobB64=await blobToBase64(project.bgBlob);
    delete project.bgBlob;
    if(includePhotos){for(const a of annts){if(a.fieldPhotos){a.fieldPhotosB64={};for(const k in a.fieldPhotos)a.fieldPhotosB64[k]=await blobToBase64(a.fieldPhotos[k]);}delete a.fieldPhotos;}}
    const link=document.createElement('a');
    link.href=URL.createObjectURL(new Blob([JSON.stringify({project,annotations:annts})],{type:'application/json'}));
    link.download=`${p.name}.json`; link.click();
}

async function importProject(inp){
    const f=inp.files[0]; if(!f) return;
    try{
        const d=JSON.parse(await f.text());
        if(d.project.pdfB64){const res=await fetch(d.project.pdfB64);d.project.pdfData=await res.arrayBuffer();delete d.project.pdfB64;}
        if(d.project.bgBlobB64){const res=await fetch(d.project.bgBlobB64);d.project.bgBlob=await res.blob();delete d.project.bgBlobB64;}
        await db.projects.put(d.project);
        for(const a of d.annotations||[]){
            if(a.fieldPhotosB64){a.fieldPhotos={};for(const k in a.fieldPhotosB64){const res=await fetch(a.fieldPhotosB64[k]);a.fieldPhotos[k]=await res.blob();}delete a.fieldPhotosB64;}
            await db.annotations.put(a);
        }
        alert("読込完了");loadProjects();
    }catch(e){console.error(e);alert("読込に失敗しました");}
    finally{inp.value="";}
}
